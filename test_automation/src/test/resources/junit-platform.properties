# Default off: Allure's Cucumber listener is not thread-safe under parallel runs, and the UI stack
# is easier to stabilize sequentially in CI. Speed up locally when you accept Allure noise, e.g.:
#   mvn test -Dcucumber.execution.parallel.enabled=true -Dcucumber.execution.parallel.config.fixed.parallelism=2
cucumber.execution.parallel.enabled=false
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=2
